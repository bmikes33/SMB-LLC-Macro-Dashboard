        --bg-secondary: #0f1420;

        --text-primary: #e2e8f0;
        --text-secondary: #8b9ab5;
        --text-muted: #4a5976;
        --green: #00e676;
        --green-dim: #00c85320;
        --red: #ff3d57;
        --red-dim: #ff3d5720;
        --amber: #ffab00;
        --amber-dim: #ffab0020;
        --blue: #2196f3;
        --blue-dim: #2196f320;
        --accent: #00e5ff;
        --purple: #b388ff;
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
      }
      * { margin:0; padding:0; box-sizing:border-box; }
      body { background:var(--bg-primary); color:var(--text-primary); font-family:var(--font-sans); font-size:13px; overflow:hidden; height:100vh; }
      ::-webkit-scrollbar { width:4px; }
      ::-webkit-scrollbar-track { background:transparent; }
      ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

      .topbar { height:36px; background:var(--bg-secondary); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; gap:16px; }
      .topbar-logo { font-family:var(--font-mono); font-weight:800; font-size:11px; letter-spacing:1.5px; color:var(--accent); text-transform:uppercase; display:flex; align-items:center; gap:6px; white-space:nowrap; }
      .topbar-logo .dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
      .topbar-regime { font-family:var(--font-mono); font-size:10px; font-weight:600; padding:3px 10px; border-radius:3px; letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; }
      .topbar-time { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-left:auto; white-space:nowrap; }

      .main { display:flex; height:calc(100vh - 36px); }

      /* LEFT SIDEBAR */
      .sidebar-left { width:240px; min-width:240px; background:var(--bg-secondary); border-right:1px solid var(--border); overflow:hidden; }
      .wl-group-header { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); padding:8px 10px 3px; border-top:1px solid var(--border); position:sticky; top:0; background:var(--bg-secondary); z-index:2; }
      .wl-group-header:first-child { border-top:none; }
      .wl-item { display:flex; align-items:center; padding:3px 10px; cursor:pointer; transition:background .1s; gap:4px; }
      .wl-item:hover { background:var(--bg-tertiary); }
      .wl-item.active { background:var(--border); border-left:2px solid var(--accent); }
      .wl-symbol { font-family:var(--font-mono); font-size:11px; font-weight:600; color:var(--text-primary); min-width:54px; }
      .wl-price { font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); flex:1; text-align:right; }
      .wl-change { font-family:var(--font-mono); font-size:10px; font-weight:600; min-width:56px; text-align:right; }

      /* CENTER */
      .center { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
      .chart-header { height:30px; min-height:30px; background:var(--bg-secondary); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; gap:10px; }
      .chart-symbol { font-family:var(--font-mono); font-size:14px; font-weight:800; color:var(--accent); }
      .chart-info { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
      .chart-container { height:48%; min-height:220px; background:var(--bg-primary); }
      .chart-container iframe { width:100%; height:100%; border:none; }

      /* ANALYSIS (scrollable) */
      .analysis-scroll { flex:1; overflow-y:auto; background:var(--bg-secondary); border-top:1px solid var(--border); padding:12px 14px; }
      .analysis-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
      .analysis-title { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:5px; }
      .case-card { border-radius:6px; padding:10px 12px; }
      .case-card.bear { background:var(--red-dim); border:1px solid #ff3d5730; }
      .case-card.bull { background:var(--green-dim); border:1px solid #00e67630; }
      .case-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
      .case-label { font-family:var(--font-mono); font-size:11px; font-weight:700; }
      .case-pct { font-family:var(--font-mono); font-size:20px; font-weight:800; }
      .case-text { font-size:11px; color:var(--text-secondary); line-height:1.55; }
      .info-row { display:grid; grid-template-columns:1fr 2fr; gap:10px; margin-bottom:10px; }
      .info-box { background:var(--bg-tertiary); border:1px solid var(--border); border-radius:6px; padding:8px 10px; }
      .info-label { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); margin-bottom:3px; }
      .info-value { font-family:var(--font-mono); font-size:12px; font-weight:700; }
      .info-detail { font-size:10px; color:var(--text-secondary); line-height:1.5; margin-top:2px; }
      .sr-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
      .sr-row { display:flex; align-items:center; padding:2px 0; font-family:var(--font-mono); font-size:10px; gap:5px; }
      .sr-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
      .sr-level { color:var(--text-primary); font-weight:600; }
      .sr-desc { color:var(--text-muted); }
      .stage-row { display:flex; align-items:center; padding:3px 0; gap:6px; font-family:var(--font-mono); font-size:10px; }
      .stage-name { min-width:90px; color:var(--text-secondary); font-weight:500; }
      .stage-bias { font-weight:700; min-width:70px; }
      .stage-note { color:var(--text-muted); font-size:9px; }

      /* RIGHT SIDEBAR */
      .sidebar-right { width:340px; min-width:340px; background:var(--bg-secondary); border-left:1px solid var(--border); display:flex; flex-direction:column; }
      .right-tabs { display:flex; border-bottom:1px solid var(--border); min-height:32px; }
      .right-tab { flex:1; text-align:center; font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; padding:8px 2px; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; transition:all .15s; }
      .right-tab:hover { color:var(--text-secondary); }
      .right-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
      .right-content { flex:1; overflow:hidden; min-height:0; }
      .news-manual { padding:8px 10px; overflow-y:auto; height:100%; }
      .news-item { padding:7px 0; border-bottom:1px solid var(--border); }
      .news-cat { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin-bottom:3px; }
      .news-detail { font-size:11px; color:var(--text-secondary); line-height:1.45; padding:1px 0; }
      .regime-panel { padding:10px; overflow-y:auto; height:100%; }
      .regime-box { border-radius:6px; padding:10px 12px; margin-bottom:8px; }
      .regime-label { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
      .regime-value { font-family:var(--font-mono); font-size:14px; font-weight:800; line-height:1.3; }
      .regime-desc { font-size:11px; color:var(--text-secondary); line-height:1.5; margin-top:6px; }
      .cal-item { display:flex; align-items:flex-start; padding:5px 0; border-bottom:1px solid var(--border); gap:8px; }
      .cal-date { font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--text-muted); min-width:48px; }
      .cal-event { font-size:11px; color:var(--text-primary); flex:1; }
      .cal-imp { font-family:var(--font-mono); font-size:9px; font-weight:700; padding:1px 5px; border-radius:2px; white-space:nowrap; }
      .threshold-row { display:flex; align-items:center; gap:6px; padding:2px 0; font-family:var(--font-mono); font-size:10px; }
      .threshold-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

      .sym-select:hover { border-color:var(--accent); }
      .sym-select option { background:var(--bg-secondary); color:var(--text-primary); }
      .sym-select optgroup { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; }

function NewsFeed() {
  const [news, setNews] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    const fetchNews = () => {
      fetch("news.json?t=" + Date.now())
        .then(r => { if(!r.ok) throw new Error("No news.json yet"); return r.json(); })
        .then(data => setNews(data))
        .catch(e => setError(e.message));
    };
    fetchNews();
    const interval = setInterval(fetchNews, 5 * 60 * 1000); // Refresh every 5 min
    return () => clearInterval(interval);
  }, []);

  if (error) return (
    <div style={{padding:12,color:"var(--text-muted)",fontSize:11,lineHeight:1.6}}>
      <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text-muted)",marginBottom:8}}>News Wire</div>
      <div style={{background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:10}}>
        Waiting for first news fetch... The GitHub Action runs on a schedule and populates news.json. You can also trigger it manually: repo → Actions → "Fetch News" → Run workflow.
      </div>
    </div>
  );

  if (!news) return <div style={{padding:12,color:"var(--text-muted)",fontSize:11}}>Loading...</div>;

  return (
    <div style={{padding:"6px 8px",overflowY:"auto",height:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text-muted)"}}>Live Wire — {news.articleCount} articles</div>
        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)"}}>{news.lastUpdatedDisplay}</div>
      </div>
      {news.articles.map((a, i) => (
        <div key={i} style={{padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
            <span style={{fontFamily:"var(--font-mono)",fontSize:8,fontWeight:700,color:a.color,letterSpacing:.5,textTransform:"uppercase"}}>{a.source}</span>
            <span style={{fontFamily:"var(--font-mono)",fontSize:8,color:"var(--text-muted)"}}>{a.timeDisplay}</span>
          </div>
          <a href={a.link} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"var(--text-primary)",textDecoration:"none",lineHeight:1.4,display:"block"}}>
            {a.title}
          </a>
        </div>
      ))}
    </div>
  );
}

function AISummary() {
  const [news, setNews] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    fetch("news.json?t=" + Date.now())
      .then(r => { if(!r.ok) throw new Error("Not available"); return r.json(); })
      .then(data => setNews(data))
      .catch(e => setError(e.message));
  }, []);

  if (error || !news) return (
    <div style={{padding:12,color:"var(--text-muted)",fontSize:11}}>
      {error ? "Waiting for first news fetch..." : "Loading..."}
    </div>
  );

  const s = news.summary || {};

  return (
    <div style={{padding:10,overflowY:"auto",height:"100%"}}>
      <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--accent)",marginBottom:8}}>Claude Macro Analysis</div>
      <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",marginBottom:10}}>Updated: {news.lastUpdatedDisplay}</div>

      {/* Macro Summary */}
      <div style={{background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:10,marginBottom:8}}>
        <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"var(--text-muted)",marginBottom:4}}>Macro Summary</div>
        <div style={{fontSize:11,color:"var(--text-secondary)",lineHeight:1.6}}>{s.macroSummary || "N/A"}</div>
      </div>

      {/* Regime Impact */}
      <div style={{background:"#ff3d5715",border:"1px solid #ff3d5730",borderRadius:6,padding:10,marginBottom:8}}>
        <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#ff3d57",marginBottom:4}}>Regime Impact</div>
        <div style={{fontSize:11,color:"var(--text-secondary)",lineHeight:1.6}}>{s.regimeImpact || "N/A"}</div>
      </div>

      {/* Key Signals */}
      {s.keySignals && s.keySignals.length > 0 && (
        <div style={{background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:10,marginBottom:8}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"var(--text-muted)",marginBottom:4}}>Key Signals</div>
          {s.keySignals.map((sig, i) => (
            <div key={i} style={{fontSize:11,color:"var(--text-secondary)",lineHeight:1.5,padding:"2px 0",display:"flex",gap:6}}>
              <span style={{color:"var(--accent)",flexShrink:0}}>▸</span> {sig}
            </div>
          ))}
        </div>
      )}

      {/* Action Items */}
      {s.actionItems && s.actionItems.length > 0 && (
        <div style={{background:"#2196f315",border:"1px solid #2196f330",borderRadius:6,padding:10}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#2196f3",marginBottom:4}}>Action Items</div>
          {s.actionItems.map((item, i) => (
            <div key={i} style={{fontSize:11,color:"var(--text-secondary)",lineHeight:1.5,padding:"2px 0",display:"flex",gap:6}}>
              <span style={{color:"#2196f3",flexShrink:0}}>→</span> {item}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
