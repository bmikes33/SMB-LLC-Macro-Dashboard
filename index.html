    <style>
      :root {

        --bg-secondary: #0f1420;
        --bg-tertiary: #141926;
        --border: #1e2a3a;
        --text-primary: #e2e8f0;
        --text-secondary: #8b9ab5;
        --text-muted: #4a5976;
        --green: #00e676;
        --green-dim: #00c85320;
        --red: #ff3d57;
        --red-dim: #ff3d5720;
        --amber: #ffab00;
        --amber-dim: #ffab0020;
        --blue: #2196f3;
        --blue-dim: #2196f320;
        --accent: #00e5ff;
        --purple: #b388ff;
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
      }
      * { margin:0; padding:0; box-sizing:border-box; }
      body { background:var(--bg-primary); color:var(--text-primary); font-family:var(--font-sans); font-size:13px; overflow:hidden; height:100vh; }
      ::-webkit-scrollbar { width:4px; }
      ::-webkit-scrollbar-track { background:transparent; }
      ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

      .topbar { height:36px; background:var(--bg-secondary); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; gap:16px; }
      .topbar-logo { font-family:var(--font-mono); font-weight:800; font-size:11px; letter-spacing:1.5px; color:var(--accent); text-transform:uppercase; display:flex; align-items:center; gap:6px; white-space:nowrap; }
      .topbar-logo .dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
      .topbar-regime { font-family:var(--font-mono); font-size:10px; font-weight:600; padding:3px 10px; border-radius:3px; letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; }
      .topbar-time { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-left:auto; white-space:nowrap; }

      .main { display:flex; height:calc(100vh - 36px); }

      /* LEFT SIDEBAR */
      .sidebar-left { width:280px; min-width:280px; background:var(--bg-secondary); border-right:1px solid var(--border); overflow:hidden; }
      .wl-group-header { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); padding:8px 10px 3px; border-top:1px solid var(--border); position:sticky; top:0; background:var(--bg-secondary); z-index:2; }
      .wl-group-header:first-child { border-top:none; }
      .wl-item { display:flex; align-items:center; padding:3px 10px; cursor:pointer; transition:background .1s; gap:4px; }
      .wl-item:hover { background:var(--bg-tertiary); }
      .wl-item.active { background:var(--border); border-left:2px solid var(--accent); }
      .wl-symbol { font-family:var(--font-mono); font-size:11px; font-weight:600; color:var(--text-primary); min-width:54px; }
      .wl-price { font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); flex:1; text-align:right; }
      .wl-change { font-family:var(--font-mono); font-size:10px; font-weight:600; min-width:56px; text-align:right; }

      /* CENTER */
      .center { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
      .chart-header { height:30px; min-height:30px; background:var(--bg-secondary); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; gap:10px; }
      .chart-symbol { font-family:var(--font-mono); font-size:14px; font-weight:800; color:var(--accent); }
      .chart-info { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
      .chart-container { height:48%; min-height:220px; background:var(--bg-primary); }
      .chart-container iframe { width:100%; height:100%; border:none; }

      /* ANALYSIS (scrollable) */
      .analysis-scroll { flex:1; overflow-y:auto; background:var(--bg-secondary); border-top:1px solid var(--border); padding:12px 14px; }
      .analysis-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
      .analysis-title { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:5px; }
      .case-card { border-radius:6px; padding:10px 12px; }
      .case-card.bear { background:var(--red-dim); border:1px solid #ff3d5730; }
      .case-card.bull { background:var(--green-dim); border:1px solid #00e67630; }
      .case-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
      .case-label { font-family:var(--font-mono); font-size:11px; font-weight:700; }
      .case-pct { font-family:var(--font-mono); font-size:20px; font-weight:800; }
      .case-text { font-size:11px; color:var(--text-secondary); line-height:1.55; }
      .info-row { display:grid; grid-template-columns:1fr 2fr; gap:10px; margin-bottom:10px; }
      .info-box { background:var(--bg-tertiary); border:1px solid var(--border); border-radius:6px; padding:8px 10px; }
      .info-label { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); margin-bottom:3px; }
      .info-value { font-family:var(--font-mono); font-size:12px; font-weight:700; }
      .info-detail { font-size:10px; color:var(--text-secondary); line-height:1.5; margin-top:2px; }
      .sr-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
      .sr-row { display:flex; align-items:center; padding:2px 0; font-family:var(--font-mono); font-size:10px; gap:5px; }
      .sr-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
      .sr-level { color:var(--text-primary); font-weight:600; }
      .sr-desc { color:var(--text-muted); }
      .stage-row { display:flex; align-items:center; padding:3px 0; gap:6px; font-family:var(--font-mono); font-size:10px; }
      .stage-name { min-width:90px; color:var(--text-secondary); font-weight:500; }
      .stage-bias { font-weight:700; min-width:70px; }
      .stage-note { color:var(--text-muted); font-size:9px; }

      /* RIGHT SIDEBAR */
      .sidebar-right { width:340px; min-width:340px; background:var(--bg-secondary); border-left:1px solid var(--border); display:flex; flex-direction:column; }
      .right-tabs { display:flex; border-bottom:1px solid var(--border); min-height:32px; }
      .right-tab { flex:1; text-align:center; font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; padding:8px 2px; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; transition:all .15s; }
      .right-tab:hover { color:var(--text-secondary); }
      .right-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
      .right-content { flex:1; overflow:hidden; min-height:0; }
      .news-manual { padding:8px 10px; overflow-y:auto; height:100%; }
      .news-item { padding:7px 0; border-bottom:1px solid var(--border); }
      .news-cat { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin-bottom:3px; }
      .news-detail { font-size:11px; color:var(--text-secondary); line-height:1.45; padding:1px 0; }
      .regime-panel { padding:10px; overflow-y:auto; height:100%; }
      .regime-box { border-radius:6px; padding:10px 12px; margin-bottom:8px; }
      .regime-label { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
      .regime-value { font-family:var(--font-mono); font-size:14px; font-weight:800; line-height:1.3; }
      .regime-desc { font-size:11px; color:var(--text-secondary); line-height:1.5; margin-top:6px; }
      .cal-item { display:flex; align-items:flex-start; padding:5px 0; border-bottom:1px solid var(--border); gap:8px; }
      .cal-date { font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--text-muted); min-width:48px; }
      .cal-event { font-size:11px; color:var(--text-primary); flex:1; }
      .cal-imp { font-family:var(--font-mono); font-size:9px; font-weight:700; padding:1px 5px; border-radius:2px; white-space:nowrap; }
      .threshold-row { display:flex; align-items:center; gap:6px; padding:2px 0; font-family:var(--font-mono); font-size:10px; }
      .threshold-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

      .sym-select:hover { border-color:var(--accent); }
      .sym-select option { background:var(--bg-secondary); color:var(--text-primary); }
      .sym-select optgroup { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; }

function NewsFeed() {
  const [news, setNews] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    const fetchNews = () => {
      fetch("news.json?t=" + Date.now())
        .then(r => { if(!r.ok) throw new Error("No news.json yet"); return r.json(); })
        .then(data => setNews(data))
        .catch(e => setError(e.message));
    };
    fetchNews();
    const interval = setInterval(fetchNews, 5 * 60 * 1000); // Refresh every 5 min
    return () => clearInterval(interval);
  }, []);

  if (error) return (
    <div style={{padding:12,color:"var(--text-muted)",fontSize:11,lineHeight:1.6}}>
      <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text-muted)",marginBottom:8}}>News Wire</div>
      <div style={{background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:10}}>
        Waiting for first news fetch... The GitHub Action runs on a schedule and populates news.json. You can also trigger it manually: repo → Actions → "Fetch News" → Run workflow.
      </div>
    </div>
  );

  if (!news) return <div style={{padding:12,color:"var(--text-muted)",fontSize:11}}>Loading...</div>;

  return (
    <div style={{padding:"6px 8px",overflowY:"auto",height:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text-muted)"}}>Live Wire — {news.articleCount} articles</div>
        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)"}}>{news.lastUpdatedDisplay}</div>
      </div>
      {news.articles.map((a, i) => (
        <div key={i} style={{padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
            <span style={{fontFamily:"var(--font-mono)",fontSize:8,fontWeight:700,color:a.color,letterSpacing:.5,textTransform:"uppercase"}}>{a.source}</span>
            <span style={{fontFamily:"var(--font-mono)",fontSize:8,color:"var(--text-muted)"}}>{a.timeDisplay}</span>
          </div>
          <a href={a.link} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"var(--text-primary)",textDecoration:"none",lineHeight:1.4,display:"block"}}>
            {a.title}
          </a>
        </div>
      ))}
    </div>
  );
}

function AISummary() {
  const [news, setNews] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    fetch("news.json?t=" + Date.now())
      .then(r => { if(!r.ok) throw new Error("Not available"); return r.json(); })
      .then(data => setNews(data))
      .catch(e => setError(e.message));
  }, []);

  if (error || !news) return (
    <div style={{padding:12,color:"var(--text-muted)",fontSize:11}}>
      {error ? "Waiting for first news fetch..." : "Loading..."}
    </div>
  );

  const s = news.summary || {};

  // Color helpers
  const pressureColors = {
    "REINFORCING": "#00e676",
    "MIXED":       "#ffab00",
    "PRESSURING":  "#ff6d00",
    "CHALLENGING": "#ff3d57",
  };
  const pressureColor = pressureColors[s.regimePressure] || "#8b9ab5";

  const tagColors = {
    "SUPPORTS":         "#00e676",
    "CONTRADICTS":      "#ff3d57",
    "THRESHOLD_WATCH":  "#ffab00",
    "NEUTRAL":          "#8b9ab5",
  };
  const regimeFallbackColor = news.currentRegimeColor || "#00e5ff";

  // Format the "as of" timestamp nicely
  let regimeAsOfDisplay = null;
  if (news.regimeAsOf) {
    try {
      const dt = new Date(news.regimeAsOf);
      regimeAsOfDisplay = dt.toLocaleDateString("en-US",{month:"short",day:"numeric"}) + " " +
                          dt.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});
    } catch (e) {}
  }

  return (
    <div style={{padding:10,overflowY:"auto",height:"100%"}}>
      <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--accent)",marginBottom:4}}>Claude Macro Analysis</div>

      {news.currentRegime && (
        <div style={{background:regimeFallbackColor+"15",border:"1px solid "+regimeFallbackColor+"40",borderRadius:6,padding:10,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>

          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
            <span style={{fontFamily:"var(--font-mono)",fontSize:12,fontWeight:800,color:regimeFallbackColor,letterSpacing:1,textTransform:"uppercase"}}>{news.currentRegime}</span>
            {news.regimeConfidence && (
              <span style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:.5,padding:"1px 6px",borderRadius:2,background:regimeFallbackColor+"25",color:regimeFallbackColor}}>{news.regimeConfidence}</span>

            <React.Fragment>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6,paddingTop:6,borderTop:"1px solid "+regimeFallbackColor+"25"}}>

                <span style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:800,color:pressureColor,letterSpacing:.5,padding:"1px 7px",borderRadius:2,background:pressureColor+"20"}}>{s.regimePressure}</span>

          {s.thresholdWatches.map((tw, i) => (
            <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"4px 0",borderTop: i > 0 ? "1px solid #ffab0025" : "none"}}>
              <span style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,color:"#ffab00",minWidth:60}}>{tw.indicator}</span>
              <span style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,color:"#ffab00",minWidth:70}}>{tw.level}</span>
              <span style={{fontSize:10,color:"var(--text-secondary)",lineHeight:1.4,flex:1}}>{tw.signal}</span>
            </div>
          ))}
        </div>
      )}

      {/* BACKWARD COMPAT: old regimeImpact field (if old news.json still around) */}
      {s.regimeImpact && !s.regimePressure && (
        <div style={{background:"#ff3d5715",border:"1px solid #ff3d5730",borderRadius:6,padding:10,marginBottom:8}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#ff3d57",marginBottom:4}}>Regime Impact</div>
          <div style={{fontSize:11,color:"var(--text-secondary)",lineHeight:1.6}}>{s.regimeImpact}</div>
        </div>
      )}

      {/* Key Signals — tagged in new schema, plain strings in old */}
      {s.keySignals && s.keySignals.length > 0 && (
        <div style={{background:"var(--bg-tertiary)",border:"1px solid var(--border)",borderRadius:6,padding:10,marginBottom:8}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"var(--text-muted)",marginBottom:6}}>Key Signals</div>
          {s.keySignals.map((sig, i) => {
            // Support both new format {signal, tag} and old format (plain string)
            const isTagged = typeof sig === "object" && sig !== null;
            const sigText = isTagged ? sig.signal : sig;
            const tag = isTagged ? sig.tag : null;
            const tagColor = tag ? (tagColors[tag] || "#8b9ab5") : null;
            return (
              <div key={i} style={{padding:"4px 0",borderTop: i > 0 ? "1px solid var(--border)" : "none"}}>
                {tag && (
                  <div style={{marginBottom:3}}>
                    <span style={{fontFamily:"var(--font-mono)",fontSize:8,fontWeight:800,letterSpacing:.8,padding:"1px 5px",borderRadius:2,background:tagColor+"25",color:tagColor,textTransform:"uppercase"}}>{tag.replace("_"," ")}</span>
                  </div>
                )}
                <div style={{fontSize:11,color:"var(--text-secondary)",lineHeight:1.5,display:"flex",gap:6}}>
                  {!tag && <span style={{color:"var(--accent)",flexShrink:0}}>▸</span>}
                  <span>{sigText}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Action Items */}
      {s.actionItems && s.actionItems.length > 0 && (
        <div style={{background:"#2196f315",border:"1px solid #2196f330",borderRadius:6,padding:10}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#2196f3",marginBottom:4}}>Action Items</div>
          {s.actionItems.map((item, i) => (
            <div key={i} style={{fontSize:11,color:"var(--text-secondary)",lineHeight:1.5,padding:"2px 0",display:"flex",gap:6}}>
              <span style={{color:"#2196f3",flexShrink:0}}>→</span> {item}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  React.useEffect(() => {

        if (!d || !d.reports || !d.reports.length) return;

        // Track latest macro for topbar regime display

                      <div style={{display:"flex",flexDirection:"column"}}>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",letterSpacing:1.5,textTransform:"uppercase"}}>Active Report</div>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:14,fontWeight:800,color:"var(--accent)",letterSpacing:.5}}>{activeReport.ticker}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column"}}>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",letterSpacing:1.5,textTransform:"uppercase"}}>Bias</div>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:biasColor(activeReport.bias),letterSpacing:.5,textTransform:"uppercase"}}>{activeReport.bias}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column"}}>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",letterSpacing:1.5,textTransform:"uppercase"}}>Confidence</div>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,letterSpacing:.5,padding:"1px 8px",borderRadius:3,background:confColor(activeReport.confidence)+"20",color:confColor(activeReport.confidence),alignSelf:"flex-start"}}>{activeReport.confidence}</div>
                      </div>
                      {activeReport.bullScore !== undefined && (
                        <div style={{display:"flex",flexDirection:"column",minWidth:160,flex:1,maxWidth:300}}>
                          <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Tool Agreement · {activeReport.bullScore}/{activeReport.scoreMax} Bull · {activeReport.bearScore}/{activeReport.scoreMax} Bear</div>
                          <div style={{display:"flex",height:8,borderRadius:2,overflow:"hidden",background:"var(--bg-tertiary)"}}>
                            <div style={{width:((activeReport.bullScore/activeReport.scoreMax)*100)+"%",background:"var(--green)"}} />
                            <div style={{width:((activeReport.bearScore/activeReport.scoreMax)*100)+"%",background:"var(--red)"}} />
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",fontFamily:"var(--font-mono)",fontSize:9,marginTop:2}}>
                            <span style={{color:"var(--green)"}}>{Math.round((activeReport.bullScore/activeReport.scoreMax)*100)}% bull</span>
                            <span style={{color:"var(--red)"}}>{Math.round((activeReport.bearScore/activeReport.scoreMax)*100)}% bear</span>
                          </div>
                        </div>
                      )}
                      <a href={"reports/" + activeReport.file} target="_blank" rel="noopener noreferrer" style={{marginLeft:"auto",fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"var(--accent)",textDecoration:"none",padding:"5px 10px",border:"1px solid var(--accent)",borderRadius:3}}>Open Full Report →</a>
                    </div>
                    {/* ZONES ROW */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:"var(--border)"}}>
                      <div style={{background:"var(--bg-secondary)",padding:"8px 12px"}}>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",letterSpacing:1.5,textTransform:"uppercase"}}>Entry Zone</div>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:13,fontWeight:700,color:"var(--green)",marginTop:2}}>{activeReport.entryZone || "—"}</div>
                      </div>
                      <div style={{background:"var(--bg-secondary)",padding:"8px 12px"}}>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",letterSpacing:1.5,textTransform:"uppercase"}}>Exit Zone</div>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:13,fontWeight:700,color:"var(--accent)",marginTop:2}}>{activeReport.exitZone || "—"}</div>
                      </div>
                      <div style={{background:"var(--bg-secondary)",padding:"8px 12px"}}>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",letterSpacing:1.5,textTransform:"uppercase"}}>Invalidation</div>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:13,fontWeight:700,color:"var(--red)",marginTop:2}}>{activeReport.invalidation || "—"}</div>
                      </div>
                    </div>
                    {/* LEVELS TABLE */}
                    {activeReport.levels && activeReport.levels.length > 0 && (
                      <div style={{padding:"10px 14px"}}>
                        <div className="analysis-title" style={{marginBottom:6}}>Key Levels</div>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                          <thead>
                            <tr style={{borderBottom:"1px solid var(--border)"}}>
                              <th style={{textAlign:"left",padding:"4px 6px",fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,color:"var(--text-muted)",letterSpacing:1,textTransform:"uppercase",width:80}}>Weight</th>
                              <th style={{textAlign:"left",padding:"4px 6px",fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,color:"var(--text-muted)",letterSpacing:1,textTransform:"uppercase",width:110}}>Price</th>
                              <th style={{textAlign:"left",padding:"4px 6px",fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,color:"var(--text-muted)",letterSpacing:1,textTransform:"uppercase"}}>Sources</th>
                            </tr>
                          </thead>
                          <tbody>
                            {activeReport.levels.map((lv,i) => (
                              <tr key={i} style={{background:levelRowBg(lv.weight),borderBottom:"1px solid var(--border)"}}>
                                <td style={{padding:"5px 6px",fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,color:levelWeightColor(lv.weight),letterSpacing:.5}}>{lv.weight}</td>
                                <td style={{padding:"5px 6px",fontFamily:"var(--font-mono)",fontSize:11,fontWeight:600,color:levelWeightColor(lv.weight)}}>{lv.price}</td>
                                <td style={{padding:"5px 6px",fontSize:11,color:"var(--text-secondary)"}}>{lv.sources}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </React.Fragment>
                ) : (
                  <div style={{padding:"20px 14px",color:"var(--text-muted)",fontSize:12}}>
                    No active report. Generate a TA report and commit it to <code>reports/</code> to populate this panel. Manual chart changes via the ticker dropdown above do not load report data.
                  </div>
                )}
              </div>
            </React.Fragment>
            )
          ) : (
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <div style={{padding:"8px 14px",borderBottom:"1px solid var(--border)",background:"var(--bg-secondary)"}}>
                <div className="analysis-title" style={{marginBottom:4}}>Key Events</div>
                {MACRO.calendar.map((c,i) => (<div className="cal-item" key={i} style={{padding:"3px 0"}}><span className="cal-date">{c.d}</span><span className="cal-event">{c.e}</span><span className="cal-imp" style={{color:impC(c.imp),background:impB(c.imp)}}>{c.imp}</span></div>))}
              </div>
              <div style={{flex:1,overflow:"hidden"}}>
                <iframe srcDoc={calHtml} style={{width:"100%",height:"100%",border:"none"}} sandbox="allow-scripts allow-same-origin" />
              </div>
            </div>
          )}
        </div>
        {/* RIGHT */}
        <div className="sidebar-right">
          <div className="right-tabs">
            {["wire","summary"].map(t => (
              <div key={t} className={`right-tab ${rightTab===t?"active":""}`} onClick={() => setRightTab(t)}>{t}</div>
            ))}
          </div>
          <div className="right-content">
            {rightTab==="wire" && (
              <NewsFeed />
            )}
            {rightTab==="summary" && (
              <AISummary />
            )}
          </div>
        </div>
      </div>
    </div>
  );
}
// REPORTS FEED COMPONENT — reads from reports/index.json
function Reports({ onSelect, activeFile }) {
  const [reports, setReports] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    fetch("reports/index.json?t=" + Date.now())
      .then(r => { if(!r.ok) throw new Error("No reports/index.json"); return r.json(); })
      .then(d => setReports(d))
      .catch(e => setError(e.message));
  }, []);

  if (error) return (
    <div style={{padding:12,color:"var(--text-muted)",fontSize:11,lineHeight:1.5}}>
      No reports yet. Create <code>reports/index.json</code> with <code>{`{ "reports": [] }`}</code> to start.
    </div>
  );
  if (!reports) return <div style={{padding:12,color:"var(--text-muted)",fontSize:11}}>Loading...</div>;

  const list = (reports.reports || []).slice().sort((a,b) => new Date(b.date) - new Date(a.date));

  const confColor = (c) => {
    if (c === "HIGH") return "var(--green)";
    if (c === "MEDIUM") return "var(--amber)";
    return "var(--red)";
  };
  const biasColor = (b) => {
    if (!b) return "var(--text-muted)";
    if (b.toUpperCase().includes("LONG")) return "var(--green)";
    if (b.toUpperCase().includes("SHORT")) return "var(--red)";
    return "var(--amber)";
  };
  const fmtDate = (d) => {
    const dt = new Date(d);
    return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"}) + " " +
           dt.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});
  };

  return (
    <div className="news-manual">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,paddingBottom:4}}>
        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",letterSpacing:.5}}>{list.length} report{list.length===1?"":"s"}</div>
      </div>
      {list.length === 0 && (
        <div style={{color:"var(--text-muted)",fontSize:11,padding:"8px 0"}}>No reports yet.</div>
      )}
      {list.map((r,i) => {
        const isActive = activeFile === r.file;
        const isMacro = r.type === "macro";
        const regimeColors = { "Risk-On":"#00e676","Reflation":"#00e5ff","Risk-Off":"#ff3d57","Deflation":"#b388ff","Stagflation":"#ffab00" };
        const regColor = isMacro ? (regimeColors[r.regime] || r.regimeColor || "#8b9ab5") : null;
        const accentColor = isMacro ? regColor : "var(--accent)";
        return (
          <div key={i}
               style={{padding:"8px 0 8px 8px",borderBottom:"1px solid var(--border)",cursor:"pointer",marginLeft:-8,marginRight:-8,paddingLeft:8,paddingRight:8,borderLeft:isActive?"2px solid "+accentColor:"2px solid transparent",background:isActive?"var(--bg-tertiary)":"transparent"}}
               onClick={() => onSelect && onSelect(r)}
               onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = "var(--bg-tertiary)"; }}
               onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = "transparent"; }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontFamily:"var(--font-mono)",fontSize:8,fontWeight:700,letterSpacing:1,padding:"1px 5px",borderRadius:2,background:isMacro?regColor+"25":"var(--accent)20",color:accentColor,textTransform:"uppercase"}}>{isMacro?"MACRO":"TA"}</span>
                <span style={{fontFamily:"var(--font-mono)",fontSize:12,fontWeight:700,color:accentColor,letterSpacing:.5}}>{isMacro ? r.regime : r.ticker}</span>
              </div>
              <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)"}}>{fmtDate(r.date)}</div>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              {!isMacro && (
                <React.Fragment>
                  <span style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",color:biasColor(r.bias)}}>{r.bias}</span>
                  <span style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:.5,padding:"1px 6px",borderRadius:2,background:confColor(r.confidence)+"20",color:confColor(r.confidence)}}>{r.confidence}</span>
                  {r.bullScore !== undefined && (
                    <span style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-secondary)"}}>{r.bullScore}/{r.scoreMax} bull</span>
                  )}
                </React.Fragment>
              )}
              {isMacro && (
                <React.Fragment>
                  <span style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:.5,padding:"1px 6px",borderRadius:2,background:confColor(r.regimeConfidence)+"20",color:confColor(r.regimeConfidence)}}>{r.regimeConfidence}</span>
                  {r.aggregateScore !== undefined && (
                    <span style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-secondary)"}}>agg {r.aggregateScore.toFixed(2)}</span>
                  )}
                </React.Fragment>
              )}
            </div>
            <div style={{marginTop:3}}>
              <a href={"reports/" + r.file} target="_blank" rel="noopener noreferrer"
                 onClick={e => e.stopPropagation()}
                 style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",textDecoration:"none",letterSpacing:.5}}>
                open html →
              </a>
            </div>
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
